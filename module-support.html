<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>报错答疑 - 智能数据库管理平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                    },
                }
            }
        }
    </script>
    <style>
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #165DFF;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="text-center">
        <div class="flex items-center justify-center mb-6">
            <i class="fa fa-comments-o text-primary text-4xl mr-3"></i>
            <h1 class="text-2xl font-bold text-primary">vastbase 智能助手 - 量仔</h1>
        </div>
        <div class="flex justify-center mb-4">
            <div class="loader"></div>
        </div>
        <p class="text-gray-600">正在跳转到问题提交页面...</p>
        <p class="text-sm text-gray-400 mt-2">如果没有自动跳转，请 <a href="support-submit.html" class="text-primary hover:underline">点击这里</a></p>
    </div>
    
    <script>
        setTimeout(function() {
            window.location.href = 'support-submit.html';
        }, 800);
    </script>
</body>
</html>
