    <!-- 功能脚本 -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 全局变量
            let uploadedFiles = [];
            
            // DOM 元素
            const fileUpload = document.getElementById('file-upload');
            const uploadedFilesContainer = document.getElementById('uploaded-files');
            const noFilesMessage = document.getElementById('no-files');
            const chatInput = document.getElementById('chat-input');
            const sendBtn = document.getElementById('send-btn');
            const chatMessages = document.getElementById('chat-messages');
            const issueTitle = document.getElementById('issue-title');
            const issueType = document.getElementById('issue-type');
            const issueDescription = document.getElementById('issue-description');
            const clearIssueBtn = document.getElementById('clear-issue');
            const submitIssueBtn = document.getElementById('submit-issue');
            const modelSelector = document.getElementById('model-selector');
            const addModelModal = document.getElementById('add-model-modal');
            const closeAddModelModal = document.getElementById('close-add-model-modal');
            const cancelAddModel = document.getElementById('cancel-add-model');
            const saveNewModel = document.getElementById('save-new-model');
            
            // 设置当前时间到欢迎消息
            const welcomeMessageTime = chatMessages.querySelector('.chat-bubble-ai .text-gray-500');
            if (welcomeMessageTime) {
                const now = new Date();
                const time = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
                welcomeMessageTime.textContent = time;
            }
            
            // 初始化界面
            updateFileList();
            
            // 文件上传处理
            fileUpload.addEventListener('change', function(e) {
                if (this.files.length > 0) {
                    handleFileUpload(this.files);
                }
            });
            
            // 拖放文件处理
            const dropArea = document.querySelector('label[for="file-upload"]');
            dropArea.addEventListener('dragover', function(e) {
                e.preventDefault();
                this.classList.add('border-primary');
            });
            
            dropArea.addEventListener('dragleave', function(e) {
                e.preventDefault();
                this.classList.remove('border-primary');
            });
            
            dropArea.addEventListener('drop', function(e) {
                e.preventDefault();
                this.classList.remove('border-primary');
                if (e.dataTransfer.files.length > 0) {
                    handleFileUpload(e.dataTransfer.files);
                }
            });
            
            // 处理文件上传
            async function handleFileUpload(files) {
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    
                    // 检查文件大小
                    if (file.size > 10 * 1024 * 1024) { // 10MB
                        alert(`文件 ${file.name} 超过大小限制 (10MB)`);
                        continue;
                    }
                    
                    // 上传文件到Dify
                    try {
                        const fileId = await uploadFileToDify(file);
                        
                        // 创建文件对象
                        const fileObj = {
                            id: Date.now() + i,
                            name: file.name,
                            size: file.size,
                            file: file,
                            difyFileId: fileId
                        };
                        
                        uploadedFiles.push(fileObj);
                        
                        // 调用Dify API分析文件并生成摘要
                        await analyzeFileWithDify(fileObj);
                    } catch (error) {
                        console.error('文件处理失败:', error);
                        addMessage('ai', `文件 ${file.name} 处理失败，请稍后重试。`);
                    }
                }
                
                updateFileList();
            }
            
            // 使用Dify API分析文件
            async function analyzeFileWithDify(fileObj) {
                try {
                    // 加载模型配置
                    const savedConfig = localStorage.getItem('modelConfig');
                    const config = savedConfig ? JSON.parse(savedConfig) : {
                        apiBaseUrl: 'http://localhost:8004/api',
                        apiKey: 'app-qO8Kt1njhD0BQkHzyQIklW8Z'
                    };
                    
                    // 准备请求数据
                    const requestData = {
                        inputs: {},
                        query: `请分析并总结文件 ${fileObj.name} 的内容`,
                        response_mode: 'blocking',
                        conversation_id: localStorage.getItem('conversationId') || '',
                        user: 'user-' + Date.now(),
                        files: [{
                            type: 'document',
                            transfer_method: 'local_file',
                            upload_file_id: fileObj.difyFileId
                        }]
                    };
                    
                    // 发送请求到Dify API
                    const response = await fetch(`${config.apiBaseUrl}/chat-messages`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${config.apiKey}`
                        },
                        body: JSON.stringify(requestData)
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        // 保存对话ID
                        if (data.conversation_id) {
                            localStorage.setItem('conversationId', data.conversation_id);
                        }
                        // 显示AI回复（文件摘要）
                        addMessage('ai', data.answer);
                    } else {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(`文件分析失败: ${errorData.error || response.statusText}`);
                    }
                } catch (error) {
                    console.error('文件分析失败:', error);
                    addMessage('ai', `文件 ${fileObj.name} 分析失败，请稍后重试。`);
                }
            }
            
            // 更新文件列表
            function updateFileList() {
                if (uploadedFiles.length > 0) {
                    noFilesMessage.style.display = 'none';
                    uploadedFilesContainer.innerHTML = '';
                    
                    uploadedFiles.forEach(file => {
                        const fileItem = document.createElement('div');
                        fileItem.className = 'flex items-center text-sm p-2 bg-white rounded-md border border-gray-200';
                        fileItem.innerHTML = `
                            <i class="fa fa-file-text-o text-primary mr-3"></i>
                            <div class="flex-1 min-w-0">
                                <p class="text-gray-700 truncate">${file.name}</p>
                                <p class="text-xs text-gray-500">${formatFileSize(file.size)}</p>
                            </div>
                            <div class="flex gap-2">
                                <button class="text-primary hover:text-primary/80" onclick="chatWithFile(${file.id})">
                                    <i class="fa fa-comment"></i>
                                </button>
                                <button class="text-gray-400 hover:text-red-500" onclick="removeFile(${file.id})">
                                    <i class="fa fa-times"></i>
                                </button>
                            </div>
                        `;
                        uploadedFilesContainer.appendChild(fileItem);
                    });
                } else {
                    noFilesMessage.style.display = 'block';
                    uploadedFilesContainer.innerHTML = '';
                }
            }
            
            // 格式化文件大小
            function formatFileSize(bytes) {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            }
            
            // 与文件对话
            window.chatWithFile = async function(fileId) {
                const file = uploadedFiles.find(f => f.id === fileId);
                if (file) {
                    addMessage('user', `我想了解文件 ${file.name} 的内容`);
                    
                    try {
                        // 加载模型配置
                        const savedConfig = localStorage.getItem('modelConfig');
                        const config = savedConfig ? JSON.parse(savedConfig) : {
                            apiBaseUrl: 'https://api.dify.ai/v1',
                            apiKey: 'app-qO8Kt1njhD0BQkHzyQIklW8Z'
                        };
                        
                        // 准备请求数据
                        const requestData = {
                            inputs: {},
                            query: `请分析并详细解释文件 ${file.name} 的内容`,
                            response_mode: 'blocking',
                            conversation_id: localStorage.getItem('conversationId') || '',
                            user: 'user-' + Date.now(),
                            files: [{
                            type: 'document',
                            transfer_method: 'local_file',
                            upload_file_id: file.difyFileId
                        }]
                        };
                        
                        // 发送请求到Dify API
                        const response = await fetch(`${config.apiBaseUrl}/chat-messages`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${config.apiKey}`
                            },
                            body: JSON.stringify(requestData)
                        });
                        
                        if (response.ok) {
                            const data = await response.json();
                            // 保存对话ID
                            if (data.conversation_id) {
                                localStorage.setItem('conversationId', data.conversation_id);
                            }
                            // 显示AI回复
                            addMessage('ai', data.answer);
                        } else {
                            throw new Error('文件分析失败');
                        }
                    } catch (error) {
                        console.error('文件对话失败:', error);
                        addMessage('ai', `文件 ${file.name} 分析失败，请稍后重试。`);
                    }
                }
            };
            
            // 移除文件
            window.removeFile = function(fileId) {
                uploadedFiles = uploadedFiles.filter(f => f.id !== fileId);
                updateFileList();
            };
            
            // 全局变量
            let lastMessageTime = '';
            
            // 聊天功能
            function addMessage(type, content) {
                const now = new Date();
                const time = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
                
                // 只在时间不同时显示时间戳
                if (time !== lastMessageTime) {
                    // 创建时间戳元素
                    const timeDiv = document.createElement('div');
                    timeDiv.className = 'flex justify-center my-2';
                    timeDiv.innerHTML = `<span class="text-xs text-gray-500 px-2 py-1 rounded-full bg-gray-200">${time}</span>`;
                    chatMessages.appendChild(timeDiv);
                    lastMessageTime = time;
                }
                
                // 创建消息元素
                const messageDiv = document.createElement('div');
                messageDiv.className = type === 'user' ? 'chat-bubble-user' : 'chat-bubble-ai';
                
                if (type === 'user') {
                    messageDiv.innerHTML = `<p>${content}</p>`;
                } else {
                    messageDiv.innerHTML = `
                        <div class="flex items-center mb-2">
                            <i class="fa fa-robot text-primary mr-2"></i>
                            <span class="text-xs font-medium">vastbase 智能助手 - 量仔</span>
                        </div>
                        <p>${content}</p>
                    `;
                }
                
                chatMessages.appendChild(messageDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
            
            // 发送消息
            function sendMessage() {
                const message = chatInput.value.trim();
                if (message) {
                    addMessage('user', message);
                    chatInput.value = '';
                    
                    // 调用Dify API获取回复
                    callDifyAPI(message);
                }
            }
            
            // 调用Dify API
            async function callDifyAPI(message) {
                try {
                    // 加载模型配置
                    const savedConfig = localStorage.getItem('modelConfig');
                    const config = savedConfig ? JSON.parse(savedConfig) : {
                        apiBaseUrl: 'http://localhost:8004/api',
                        apiKey: 'app-qO8Kt1njhD0BQkHzyQIklW8Z'
                    };
                    
                    // 准备请求数据
                    const requestData = {
                        inputs: {},
                        query: message,
                        response_mode: 'blocking',
                        conversation_id: localStorage.getItem('conversationId') || '',
                        user: 'user-' + Date.now()
                    };
                    
                    // 发送请求到Dify API
                    const response = await fetch(`${config.apiBaseUrl}/chat-messages`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${config.apiKey}`
                        },
                        body: JSON.stringify(requestData)
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        // 保存对话ID
                        if (data.conversation_id) {
                            localStorage.setItem('conversationId', data.conversation_id);
                        }
                        // 显示AI回复
                        addMessage('ai', data.answer);
                    } else {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(`API请求失败: ${errorData.error || response.statusText}`);
                    }
                } catch (error) {
                    console.error('调用Dify API失败:', error);
                    addMessage('ai', '抱歉，调用服务时出现错误，请稍后重试。');
                }
            }
            
            // 上传文件到Dify
            async function uploadFileToDify(file) {
                try {
                    // 加载模型配置
                    const savedConfig = localStorage.getItem('modelConfig');
                    const config = savedConfig ? JSON.parse(savedConfig) : {
                        apiBaseUrl: 'http://localhost:8004/api',
                        apiKey: 'app-qO8Kt1njhD0BQkHzyQIklW8Z'
                    };
                    
                    // 创建FormData
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('user', 'user-' + Date.now());
                    
                    // 发送文件上传请求
                    const response = await fetch(`${config.apiBaseUrl}/files/upload`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${config.apiKey}`
                        },
                        body: formData
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        return data.id;
                    } else {
                        throw new Error('文件上传失败');
                    }
                } catch (error) {
                    console.error('文件上传失败:', error);
                    throw error;
                }
            }
            
            // 聊天输入框回车发送
            chatInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            // 发送按钮点击事件
            sendBtn.addEventListener('click', sendMessage);
            
            // 清空问题表单
            clearIssueBtn.addEventListener('click', function() {
                issueTitle.value = '';
                issueType.value = 'installation';
                issueDescription.value = '';
                uploadedFiles = [];
                updateFileList();
                alert('表单已清空');
            });
            
            // 提交问题
            submitIssueBtn.addEventListener('click', function() {
                const title = issueTitle.value.trim();
                const type = issueType.value;
                const description = issueDescription.value.trim();
                
                if (!title || !description) {
                    alert('请填写问题标题和详细描述');
                    return;
                }
                
                // 构建问题信息
                const issueInfo = {
                    title: title,
                    type: type,
                    description: description,
                    files: uploadedFiles.map(file => file.name)
                };
                
                // 将问题信息发送到聊天界面
                addMessage('user', `问题提交：\n标题：${title}\n类型：${type === 'installation' ? '安装升级问题' : '运维问题'}\n描述：${description}\n已上传文件：${uploadedFiles.length > 0 ? uploadedFiles.map(file => file.name).join(', ') : '无'}`);
                
                // 调用API获取回复
                callDifyAPI(`请分析以下问题：\n标题：${title}\n类型：${type === 'installation' ? '安装升级问题' : '运维问题'}\n描述：${description}`);
                
                // 清空表单
                issueTitle.value = '';
                issueType.value = 'installation';
                issueDescription.value = '';
                uploadedFiles = [];
                updateFileList();
            });
            
            // 模型选择下拉框事件
            modelSelector.addEventListener('change', function() {
                if (this.value === 'add-model') {
                    // 打开新增模型模态框
                    addModelModal.classList.remove('hidden');
                    // 重置选择框到默认选项
                    this.value = 'dify';
                }
            });
            
            // 关闭新增模型模态框
            function closeAddModelModalFunc() {
                addModelModal.classList.add('hidden');
                // 清空表单
                document.getElementById('new-model-name').value = '';
                document.getElementById('new-model-type').value = 'openai';
                document.getElementById('new-model-api-url').value = '';
                document.getElementById('new-model-api-key').value = '';
            }
            
            closeAddModelModal.addEventListener('click', closeAddModelModalFunc);
            cancelAddModel.addEventListener('click', closeAddModelModalFunc);
            
            // 点击模态框外部关闭
            addModelModal.addEventListener('click', function(e) {
                if (e.target === addModelModal) {
                    closeAddModelModalFunc();
                }
            });
            
            // 保存新模型
            saveNewModel.addEventListener('click', function() {
                const modelName = document.getElementById('new-model-name').value.trim();
                const modelType = document.getElementById('new-model-type').value;
                const apiUrl = document.getElementById('new-model-api-url').value.trim();
                const apiKey = document.getElementById('new-model-api-key').value.trim();
                
                if (!modelName || !apiKey) {
                    alert('请填写模型名称和API密钥');
                    return;
                }
                
                // 创建新模型选项
                const newOption = document.createElement('option');
                newOption.value = modelName.toLowerCase().replace(/\s+/g, '-');
                newOption.textContent = `${modelName} (${modelType})`;
                
                // 插入到"新增模型"选项之前
                const addModelOption = modelSelector.querySelector('option[value="add-model"]');
                modelSelector.insertBefore(newOption, addModelOption);
                
                // 保存模型配置到本地存储
                let models = JSON.parse(localStorage.getItem('customModels') || '[]');
                models.push({
                    name: modelName,
                    type: modelType,
                    apiUrl: apiUrl,
                    apiKey: apiKey
                });
                localStorage.setItem('customModels', JSON.stringify(models));
                
                alert('模型添加成功！');
                closeAddModelModalFunc();
            });
            
            // 加载自定义模型
            function loadCustomModels() {
                const models = JSON.parse(localStorage.getItem('customModels') || '[]');
                const addModelOption = modelSelector.querySelector('option[value="add-model"]');
                
                models.forEach(model => {
                    const newOption = document.createElement('option');
                    newOption.value = model.name.toLowerCase().replace(/\s+/g, '-');
                    newOption.textContent = `${model.name} (${model.type})`;
                    modelSelector.insertBefore(newOption, addModelOption);
                });
            }
            
            // 初始化加载自定义模型
            loadCustomModels();
        });
    </script>
</body>
</html>
