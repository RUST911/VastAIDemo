        }
        .markdown-content pre code {

            padding: 0;

        .markdown-content blockquote {
            border-left: 4px solid #165DFF;
            padding-left: 1em;
            margin: 0.75em 0;
            color: #6b7280;
            background-color: #f9fafb;
            border-radius: 0 4px 4px 0;
            padding: 0.5em 1em;
        }
        .markdown-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 0.75em 0;

        }
        .markdown-content th,

            border: 1px solid #e5e7eb;

        .markdown-content th {

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            sessionStorage.removeItem('dify_conversationId');
            sessionStorage.removeItem('dify_conversationId_timestamp');
            sessionStorage.removeItem('bigmodel_conversation_history');
            sessionStorage.removeItem('messageHistory');
            
            const AppState = {
                conversationId: null,
                userId: null,
                bigmodelConversationHistory: [],
                STORAGE_KEY: 'dify_conversationId',
                USER_ID_KEY: 'dify_userId',
                TIMESTAMP_KEY: 'dify_conversationId_timestamp',
                SESSION_TIMEOUT: 30 * 60 * 1000,
                
                init() {
                    this.conversationId = this.getValidConversationId();
                    this.userId = this.getOrCreateUserId();
                    this.bigmodelConversationHistory = JSON.parse(sessionStorage.getItem('bigmodel_conversation_history') || '[]');
                },
                
                getOrCreateUserId() {
                    let id = localStorage.getItem(this.USER_ID_KEY);
                    if (!id) {
                        id = 'user-' + Math.random().toString(36).substring(2, 15) + Date.now();
                        localStorage.setItem(this.USER_ID_KEY, id);
                    }
                    return id;
                },
                
                getUserId() {
                    return this.userId;
                },
                
                getValidConversationId() {
                    let storedId = sessionStorage.getItem(this.STORAGE_KEY);
                    let storedTimestamp = sessionStorage.getItem(this.TIMESTAMP_KEY);
                    
                    if (storedId && storedTimestamp) {
                        const elapsed = Date.now() - parseInt(storedTimestamp, 10);
                        if (elapsed > this.SESSION_TIMEOUT) {
                            this.clearConversationId();
                            return null;
                        }
                        return storedId;
                    }
                    return null;
                },
                
                isSessionExpired() {
                    let storedTimestamp = sessionStorage.getItem(this.TIMESTAMP_KEY);
                    if (!storedTimestamp) return true;
                    return (Date.now() - parseInt(storedTimestamp, 10)) > this.SESSION_TIMEOUT;
                },
                
                resetConversation() {
                    this.conversationId = null;
                    sessionStorage.removeItem(this.STORAGE_KEY);
                    sessionStorage.removeItem(this.TIMESTAMP_KEY);
                    this.bigmodelConversationHistory = [];
                    sessionStorage.removeItem('bigmodel_conversation_history');
                    return this.conversationId;
                },
                
                getConversationId() {
                    if (this.conversationId && this.isSessionExpired()) {
                        this.clearConversationId();
                        return null;
                    }
                    return this.conversationId;
                },
                
                updateConversationId(newId) {
                    this.conversationId = newId;
                    sessionStorage.setItem(this.STORAGE_KEY, newId);
                    sessionStorage.setItem(this.TIMESTAMP_KEY, Date.now().toString());
                },
                
                clearConversationId() {
                    this.conversationId = null;
                    sessionStorage.removeItem(this.STORAGE_KEY);
                    sessionStorage.removeItem(this.TIMESTAMP_KEY);
                },
                
                refreshTimestamp() {
                    if (this.conversationId) {
                        sessionStorage.setItem(this.TIMESTAMP_KEY, Date.now().toString());
                    }
                },
                
                saveBigModelHistory(history) {
                    this.bigmodelConversationHistory = history;
                    sessionStorage.setItem('bigmodel_conversation_history', JSON.stringify(history));
                },
                
                getBigModelHistory() {
                    return this.bigmodelConversationHistory;
                }
            };
            
            AppState.init();
            
            let uploadedFiles = JSON.parse(sessionStorage.getItem('uploadedFiles') || '[]').map(f => ({
                ...f,
                selected: false,
                isNew: false
            }));
            let currentModel = 'GLM-5';
            let lastMessageTime = '';
            let messageHistory = JSON.parse(sessionStorage.getItem('messageHistory') || '[]');
            
            function saveUploadedFiles() {
                const filesToSave = uploadedFiles.map(f => ({
                    id: f.id,
                    name: f.name,
                    size: f.size,
                    type: f.type,
                    content: f.content
                }));
                sessionStorage.setItem('uploadedFiles', JSON.stringify(filesToSave));
            }
            
            const chatMessages = document.getElementById('chat-messages');
            const chatInput = document.getElementById('chat-input');
            const sendBtn = document.getElementById('send-btn');
            const attachBtn = document.getElementById('attach-btn');
            const fileInput = document.getElementById('file-input');
            const resetConversationBtn = document.getElementById('reset-conversation-btn');
            const exportReportBtn = document.getElementById('export-report-btn');
            const sidebar = document.getElementById('sidebar');
            const sidebarOverlay = document.getElementById('sidebar-overlay');
            const toggleSidebar = document.getElementById('toggle-sidebar');
            const sidebarFileList = document.getElementById('sidebar-file-list');
            const sidebarNoFiles = document.getElementById('sidebar-no-files');
            const sidebarFileCount = document.getElementById('sidebar-file-count');
            const issueTitleDisplay = document.getElementById('issue-title-display');
            const currentModelDisplay = document.getElementById('current-model-display');
            const modelSelectBtn = document.getElementById('model-select-btn');
            const modelSelectorPanel = document.getElementById('model-selector-panel');
            const modelList = document.getElementById('model-list');
            const noModelsTip = document.getElementById('no-models-tip');
            
            function getModels() {
                return JSON.parse(localStorage.getItem('models') || '[]');
            }
            
            function loadModelList() {
                const models = getModels();
                modelList.innerHTML = '';
                
                if (models.length > 0) {
                    noModelsTip.classList.add('hidden');
                    models.forEach(model => {
                        const modelItem = document.createElement('div');
                        modelItem.className = 'px-3 py-2 hover:bg-gray-50 cursor-pointer flex items-center justify-between rounded-lg';
                        const isSelected = model.name === currentModel;
                        if (isSelected) {
                            modelItem.className += ' bg-primary/5';
                        }
                        modelItem.innerHTML = `
                            <div class="flex items-center gap-2">
                                <i class="fa fa-cube ${isSelected ? 'text-primary' : 'text-gray-400'}"></i>
                                <div>
                                    <p class="font-medium text-sm ${isSelected ? 'text-primary' : ''}">${model.name}</p>
                                    <p class="text-xs text-gray-500">${model.type === 'dify-api' ? 'Dify API' : 'BigModel'}</p>
                                </div>
                            </div>
                            ${isSelected ? '<i class="fa fa-check text-primary"></i>' : ''}
                        `;
                        modelItem.addEventListener('click', () => selectModel(model));
                        modelList.appendChild(modelItem);
                    });
                } else {
                    noModelsTip.classList.remove('hidden');
                }
            }
            
            function selectModel(model) {
                currentModel = model.name;
                currentModelDisplay.textContent = model.name;
                localStorage.setItem('selectedModel', model.name);
                modelSelectorPanel.classList.add('hidden');
                loadModelList();
                showToast('success', `已选择模型: ${model.name}`);
            }
            
            modelSelectBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                modelSelectorPanel.classList.toggle('hidden');
                loadModelList();
            });
            
            document.addEventListener('click', function(e) {
                if (!modelSelectorPanel.contains(e.target) && !modelSelectBtn.contains(e.target)) {
                    modelSelectorPanel.classList.add('hidden');
                }
            });
            
            const savedModel = localStorage.getItem('selectedModel');
            if (savedModel) {
                const models = getModels();
                const modelExists = models.find(m => m.name === savedModel);
                if (modelExists) {
                    currentModel = savedModel;
                    currentModelDisplay.textContent = savedModel;
                }
            }
            
            function getSafeApiBaseUrl(originalUrl) {
                let apiBaseUrl = originalUrl || '/api/dify/v1';
                if (apiBaseUrl.includes('api.dify.ai') || apiBaseUrl.includes('dify.ai')) {
                    apiBaseUrl = '/api/dify/v1';
                }
                if (!apiBaseUrl.endsWith('/v1') && !apiBaseUrl.includes('/v1/')) {
                    apiBaseUrl = apiBaseUrl.replace(/\/$/, '') + '/v1';
                }
                return apiBaseUrl;
            }
            
            function getFriendlyErrorMessage(errorMsg) {
                if (!errorMsg) return '抱歉，系统出现了未知错误，请稍后再试。';
                
                const msgStr = typeof errorMsg === 'string' ? errorMsg : JSON.stringify(errorMsg);
                
                if (msgStr.includes('429') || msgStr.includes('1302') || msgStr.includes('速率限制') || msgStr.includes('rate limit')) {
                    return '【请求过于频繁】您的 AI 接口调用已达到速率限制。请稍等 1-2 分钟后再尝试。';
                }
                
                if (msgStr.includes('AbortError') || msgStr.includes('超时') || msgStr.includes('timeout')) {
                    return '【请求超时】AI 思考时间过长，请尝试简化您的问题或稍后重试。';
                }
                
                if (msgStr.includes('Failed to fetch') || msgStr.includes('NetworkError') || msgStr.includes('无法连接')) {
                    return '【网络连接失败】无法连接到 AI 服务。请检查您的网络状态。';
                }

                if (msgStr.includes('401') || msgStr.includes('Unauthorized') || msgStr.includes('API密钥未配置')) {
                    return '【认证失败】API 密钥无效或未配置。';
                }

                return `抱歉，调用服务时出现错误：${msgStr}`;
            }
            
            function formatFileSize(bytes) {
                if (bytes === 0) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }
            
            function getFileIcon(fileName) {
                const ext = fileName.split('.').pop().toLowerCase();
                const iconMap = {
                    'txt': 'fa-file-text-o',
                    'pdf': 'fa-file-pdf-o',
                    'doc': 'fa-file-word-o', 'docx': 'fa-file-word-o',
                    'xls': 'fa-file-excel-o', 'xlsx': 'fa-file-excel-o',
                    'jpg': 'fa-file-image-o', 'jpeg': 'fa-file-image-o', 'png': 'fa-file-image-o', 'gif': 'fa-file-image-o',
                    'zip': 'fa-file-archive-o', 'rar': 'fa-file-archive-o',
                    'log': 'fa-file-text-o', 'json': 'fa-file-code-o', 'xml': 'fa-file-code-o'
                };
                return iconMap[ext] || 'fa-file-o';
            }
            
            function isImageFile(file) {
                return file && file.type && file.type.startsWith('image/');
            }
            
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            function renderMarkdown(content) {
                if (typeof marked !== 'undefined') {
                    try {
                        return marked.parse(content);
                    } catch (e) {
                        console.error('Markdown解析失败:', e);
                        return escapeHtml(content);
                    }
                }
                return escapeHtml(content);
            }
            
            function showToast(type, message) {
                const existingToast = document.getElementById('custom-toast');
                if (existingToast) existingToast.remove();
                
                const toast = document.createElement('div');
                toast.id = 'custom-toast';
                toast.className = `fixed top-4 right-4 px-4 py-3 rounded-lg shadow-lg z-50 flex items-center gap-3 transition-opacity duration-500 ${
                    type === 'success' ? 'bg-green-500 text-white' : 
                    type === 'error' ? 'bg-red-500 text-white' : 
                    'bg-blue-500 text-white'
                }`;
                toast.innerHTML = `
                    <i class="fa ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i>
                    <span>${message}</span>
                `;
                document.body.appendChild(toast);
                
                setTimeout(() => {
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 500);
                }, 3000);
            }
            
            function updateSidebarFiles() {
                const selectedCount = uploadedFiles.filter(f => f.selected).length;
                saveUploadedFiles();
                if (uploadedFiles.length === 0) {
                    sidebarNoFiles.classList.remove('hidden');
                    sidebarFileList.classList.add('hidden');
                    sidebarFileCount.textContent = '(0个)';
                } else {
                    sidebarNoFiles.classList.add('hidden');
                    sidebarFileList.classList.remove('hidden');
                    sidebarFileCount.textContent = `(${uploadedFiles.length}个，已选${selectedCount}个)`;
                    
                    sidebarFileList.innerHTML = uploadedFiles.map(file => {
                        const icon = getFileIcon(file.name);
                        const isImage = isImageFile(file);
                        const checkedAttr = file.selected ? 'checked' : '';
                        const bgClass = file.selected ? 'bg-blue-50 border-blue-300' : 'bg-gray-50 border-gray-200';
                        return `
                            <div class="file-list-item p-3 ${bgClass} rounded-lg border cursor-pointer transition-all" data-file-id="${file.id}">
                                <div class="flex items-start gap-3">
                                    <input type="checkbox" 
                                           class="file-checkbox mt-1 w-4 h-4 text-primary rounded border-gray-300 focus:ring-primary cursor-pointer"
                                           data-file-id="${file.id}"
                                           ${checkedAttr}
                                           onclick="event.stopPropagation(); toggleFileSelection('${file.id}')">
                                    <div class="flex-shrink-0 w-8 h-8 rounded-lg ${isImage ? 'bg-orange-100' : 'bg-blue-100'} flex items-center justify-center">
                                        <i class="fa ${icon} ${isImage ? 'text-orange-500' : 'text-primary'}"></i>
                                    </div>
                                    <div class="flex-1 min-w-0" onclick="downloadFile('${file.id}', '${escapeHtml(file.name)}')">
                                        <p class="text-sm font-medium text-gray-700 truncate" title="${escapeHtml(file.name)}">${escapeHtml(file.name)}</p>
                                        <p class="text-xs text-gray-500">${formatFileSize(file.size)}</p>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
            }
            
            window.toggleFileSelection = function(fileId) {
                const file = uploadedFiles.find(f => f.id === fileId);
                if (file) {
                    file.selected = !file.selected;
                    updateSidebarFiles();
                }
            };
            
            window.downloadFile = function(fileId, fileName) {
                const file = uploadedFiles.find(f => f.id === fileId);
                if (file && file.content) {
                    const a = document.createElement('a');
                    a.href = file.content;
                    a.download = fileName;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                } else {
                    showToast('error', '文件已被清理，请重新上传');
                }
            };
            
            window.removeChatFile = function(fileId) {
                uploadedFiles = uploadedFiles.filter(f => f.id !== fileId);
                updateSidebarFiles();
            };
            
            function addMessage(type, content, files = []) {
                const now = new Date();
                const time = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
                
                messageHistory.push({
                    role: type === 'user' ? 'user' : 'assistant',
                    content: content,
                    timestamp: now.toISOString()
                });
                sessionStorage.setItem('messageHistory', JSON.stringify(messageHistory));
                
                if (time !== lastMessageTime) {
                    const timeDiv = document.createElement('div');
                    timeDiv.className = 'flex justify-center my-2';
                    timeDiv.innerHTML = `<span class="text-xs text-gray-500 px-2 py-1 rounded-full bg-gray-200">${time}</span>`;
                    chatMessages.appendChild(timeDiv);
                    lastMessageTime = time;
                }
                
                const messageDiv = document.createElement('div');
                messageDiv.className = type === 'user' ? 'chat-bubble-user' : 'chat-bubble-ai';
                
                if (type === 'user') {
                    let html = `<p>${escapeHtml(content)}</p>`;
                    if (files && files.length > 0) {
                        html += `<div class="message-files mt-2 pt-2 border-t border-white/20">
                            <div class="text-xs opacity-75 mb-1"><i class="fa fa-paperclip"></i> 附件 (${files.length})</div>
                            ${files.map(f => `<span class="inline-block text-xs bg-white/20 px-2 py-1 rounded mr-1 mb-1">${escapeHtml(f.name)}</span>`).join('')}
                        </div>`;
                    }
                    messageDiv.innerHTML = html;
                } else {
                    const renderedContent = renderMarkdown(content);
                    let html = `
                        <div class="flex items-center mb-2">
                            <i class="fa fa-robot text-primary mr-2"></i>
                            <span class="text-xs font-medium">vastbase 智能助手 - 量仔</span>
                        </div>
                        <div class="markdown-content">${renderedContent}</div>
                    `;
                    messageDiv.innerHTML = html;
                    messageDiv.querySelectorAll('pre code').forEach((block) => {
                        if (typeof hljs !== 'undefined') {
                            hljs.highlightElement(block);
                        }
                    });
                }
                
                chatMessages.appendChild(messageDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
            
            function showThinkingBubble() {
                if (document.getElementById('thinking-bubble')) return;
                
                const thinkingDiv = document.createElement('div');
                thinkingDiv.id = 'thinking-bubble';
                thinkingDiv.className = 'chat-bubble-ai';
                thinkingDiv.innerHTML = `
                    <div class="flex items-center mb-2">
                        <i class="fa fa-robot text-primary mr-2"></i>
                        <span class="text-xs font-medium">vastbase 智能助手 - 量仔</span>
                    </div>
                    <div class="flex items-center gap-2 text-gray-500 italic text-sm">
                        <i class="fa fa-spinner fa-spin text-primary"></i>
                        <span>量仔正在思考中...</span>
                    </div>
                `;
                chatMessages.appendChild(thinkingDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
            
            function removeThinkingBubble() {
                const thinkingDiv = document.getElementById('thinking-bubble');
                if (thinkingDiv) {
                    thinkingDiv.remove();
                }
            }
            
            async function sendMessage() {
                const message = chatInput.value.trim();
                
                if (!message) return;
                
                const models = getModels();
                const selectedModelObj = models.find(m => m.name === currentModel);
                
                if (!selectedModelObj || !selectedModelObj.apiKey) {
                    showToast('error', '请先在问题提交页面配置模型');
                    return;
                }
                
                const selectedFiles = uploadedFiles.filter(f => f.selected);
                
                addMessage('user', message, selectedFiles);
                chatInput.value = '';
                
                showThinkingBubble();
                
                try {
                    const apiKey = selectedModelObj.apiKey;
                    const isGLM = selectedModelObj.type === 'bigmodel';
                    
                    if (isGLM) {
                        await callBigModelAPI(message, selectedModelObj, apiKey, selectedFiles);
                    } else {
                        await callDifyAPI(message, selectedModelObj, apiKey, selectedFiles);
                    }
                } catch (error) {
                    console.error('发送消息失败:', error);
                    removeThinkingBubble();
                    addMessage('ai', getFriendlyErrorMessage(error.message));
                }
            }
            
            async function callBigModelAPI(message, modelConfig, apiKey, files = []) {
                const modelMap = {
                    'glm-5': 'glm-5',
                    'glm-4.7': 'glm-4.7v',
                    'glm-4v': 'glm-4v'
                };
                
                const modelName = modelMap[modelConfig.bigmodel] || 'glm-5';
                const apiUrl = modelConfig.apiBaseUrl || 'https://open.bigmodel.cn/api/coding/paas/v4/chat/completions';
                
                const conversationHistory = AppState.getBigModelHistory();
                
                let fileContent = '';
                if (files.length > 0) {
                    fileContent = '\n\n--- 附件内容 ---\n';
                    for (const file of files) {
                        if (file.content) {
                            const content = file.content.split(',')[1] || '';
                            const decodedContent = atob(content);
                            if (decodedContent.length > 8000) {
                                fileContent += `\n[${file.name}]: ${decodedContent.substring(0, 8000)}\n...[内容过长已截断]`;
                            } else {
                                fileContent += `\n[${file.name}]: ${decodedContent}`;
                            }
                        }
                    }
                }
                
                const userMessage = message + fileContent;
                
                conversationHistory.push({
                    role: 'user',
                    content: userMessage
                });
                
                const requestData = {
                    model: modelName,
                    messages: conversationHistory
                };
                
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 300000);
                
                try {
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify(requestData),
                        signal: controller.signal
                    });
                    
                    clearTimeout(timeoutId);
                    removeThinkingBubble();
                    
                    if (response.ok) {
                        const data = await response.json();
                        const assistantMessage = data.choices && data.choices[0] && data.choices[0].message 
                            ? data.choices[0].message.content 
                            : '抱歉，未获取到有效回复。';
                        
                        conversationHistory.push({
                            role: 'assistant',
                            content: assistantMessage
                        });
                        
                        if (conversationHistory.length > 20) {
                            conversationHistory.splice(0, conversationHistory.length - 20);
                        }
                        AppState.saveBigModelHistory(conversationHistory);
                        
                        addMessage('ai', assistantMessage);
                    } else {
                        const errorData = await response.json().catch(() => ({}));
                        const errorMsg = errorData.error && errorData.error.message 
                            ? errorData.error.message 
                            : response.statusText;
                        throw new Error(`BigModel API请求失败: ${errorMsg}`);
                    }
                } catch (error) {
                    clearTimeout(timeoutId);
                    throw error;
                }
            }
            
            async function callDifyAPI(message, modelConfig, apiKey, files = []) {
                const apiBaseUrl = getSafeApiBaseUrl(modelConfig.apiBaseUrl);
                const conversationId = AppState.getConversationId();
                
                let fileContent = '';
                if (files && files.length > 0) {
                    fileContent = '\n\n--- 附件内容 ---';
                    for (const file of files) {
                        if (file.content) {
                            const content = file.content.split(',')[1] || '';
                            try {
                                const decodedContent = atob(content);
                                if (decodedContent.length > 8000) {
                                    fileContent += `\n[${file.name}]: ${decodedContent.substring(0, 8000)}\n...[内容过长已截断]`;
                                } else {
                                    fileContent += `\n[${file.name}]: ${decodedContent}`;
                                }
                            } catch (e) {
                                fileContent += `\n[${file.name}]: [无法解码文件内容]`;
                            }
                        }
                    }
                }
                
                const requestData = {
                    inputs: {},
                    query: message + fileContent,
                    response_mode: 'blocking',
                    user: AppState.getUserId()
                };
                
                if (conversationId) {
                    requestData.conversation_id = conversationId;
                }
                
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 300000);
                
                try {
                    const response = await fetch(`${apiBaseUrl}/chat-messages`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify(requestData),
                        signal: controller.signal
                    });
                    
                    clearTimeout(timeoutId);
                    removeThinkingBubble();
                    
                    if (response.ok) {
                        const data = await response.json();
                        
                        if (data.conversation_id) {
                            AppState.updateConversationId(data.conversation_id);
                        } else {
                            AppState.refreshTimestamp();
                        }
                        
                        addMessage('ai', data.answer || '抱歉，未获取到有效回复。');
                    } else {
                        const errorText = await response.text().catch(() => '');
                        let errorMsg = `API请求失败: HTTP ${response.status}`;
                        try {
                            const errorJson = JSON.parse(errorText);
                            errorMsg = errorJson.message || errorJson.error?.message || errorMsg;
                        } catch (e) {
                            if (errorText) errorMsg += ` - ${errorText}`;
                        }
                        throw new Error(errorMsg);
                    }
                } catch (error) {
                    clearTimeout(timeoutId);
                    throw error;
                }
            }
            
            function loadPendingIssue() {
                const pendingIssue = sessionStorage.getItem('pendingIssue');
                
                if (pendingIssue) {
                    try {
                        const issueData = JSON.parse(pendingIssue);
                        
                        issueTitleDisplay.textContent = issueData.title || '-';
                        currentModel = issueData.model || 'GLM-5';
                        currentModelDisplay.textContent = currentModel;
                        
                        if (issueData.files && issueData.files.length > 0) {
                            uploadedFiles = issueData.files;
                            updateSidebarFiles();
                        }
                        
                        const typeTextMap = {
                            'installation': '安装升级问题',
                            'operation': '运维问题',
                            'exbase': 'Exbase迁移问题'
                        };
                        const typeText = typeTextMap[issueData.type] || '未知类型';
                        const formattedText = `问题标题：${issueData.title}\n问题类型：${typeText}\n问题描述：${issueData.description}`;
                        
                        sessionStorage.removeItem('pendingIssue');
                        
                        setTimeout(() => {
                            addMessage('user', formattedText, uploadedFiles);
                            showThinkingBubble();
                            
                            const models = getModels();
                            const selectedModelObj = models.find(m => m.name === currentModel);
                            
                            if (selectedModelObj && selectedModelObj.apiKey) {
                                const apiKey = selectedModelObj.apiKey;
                                const isGLM = selectedModelObj.type === 'bigmodel';
                                
                                if (isGLM) {
                                    callBigModelAPI(formattedText, selectedModelObj, apiKey, uploadedFiles);
                                } else {
                                    callDifyAPI(formattedText, selectedModelObj, apiKey, uploadedFiles);
                                }
                            } else {
                                removeThinkingBubble();
                                addMessage('ai', '请先在问题提交页面配置并选择模型。');
                            }
                        }, 500);
                        
                    } catch (e) {
                        console.error('加载待处理问题失败:', e);
                    }
                }
            }
            
            function handleFileUpload(files) {
                const maxSize = 10 * 1024 * 1024;
                
                Array.from(files).forEach(file => {
                    if (file.size > maxSize) {
                        showToast('error', `文件 ${file.name} 超过10MB限制`);
                        return;
                    }
                    
                    const fileId = 'file-' + Date.now() + '-' + Math.random().toString(36).substring(2, 9);
                    
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        uploadedFiles.push({
                            id: fileId,
                            name: file.name,
                            size: file.size,
                            type: file.type,
                            content: e.target.result,
                            selected: true,
                            isNew: true
                        });
                        updateSidebarFiles();
                        showToast('success', `文件 ${file.name} 上传成功`);
                    };
                    reader.readAsDataURL(file);
                });
            }
            
            function resetConversation() {
                if (!confirm('确定要开始新对话吗？这将清空当前会话的所有消息和文件。')) {
                    return;
                }
                
                AppState.resetConversation();
                uploadedFiles = [];
                messageHistory = [];
                sessionStorage.removeItem('messageHistory');
                sessionStorage.removeItem('uploadedFiles');
                updateSidebarFiles();
                
                chatMessages.innerHTML = `
                    <div class="chat-bubble-ai">
                        <div class="flex items-center mb-2">
                            <i class="fa fa-robot text-primary mr-2"></i>
                            <span class="text-xs font-medium">vastbase 智能助手 - 量仔</span>
                        </div>
                        <p>我是 vastbase 智能助手 - 量仔。我可以帮助用户：</p>
                        <p class="mt-2">1. 基于用户上传的文件、历史对话内容，进行问题诊断与分析。</p>
                        <p>2. 针对诊断结果，生成清晰、可落地的解决方案。</p>
                    </div>
                `;
                
                lastMessageTime = '';
                issueTitleDisplay.textContent = '-';
                
                showToast('success', '已开始新对话');
            }
            
            async function exportReport() {
                if (messageHistory.length <= 1) {
                    showToast('error', '当前对话为空，无法生成报告');
                    return;
                }
                
                let contextContent = '';
                messageHistory.forEach((msg, index) => {
                    if (msg.content.includes('📊 生成对话分析报告')) return;
                    const role = msg.role === 'user' ? '用户' : '助手';
                    contextContent += `### ${role} (${index + 1})\n${msg.content}\n\n`;
                });
                
                const uploadedFilesInfo = uploadedFiles.map(f => `- ${f.name} (${formatFileSize(f.size)})`).join('\n');
                
                const reportPrompt = `你是一位专业的技术支持工程师。请基于以下对话上下文，生成一份简洁、专业的**故障分析报告**。

## 报告要求
- **格式**：Markdown格式
- **总字数**：控制在800-1200字以内

## 报告结构

### 1. 故障概述（100字以内）
简要描述故障现象、影响范围和紧急程度。

### 2. 故障分析（200-300字）
- 故障原因分析
- 相关日志/错误信息解读
- 根因定位过程

### 3. 解决方案（300-400字）
- 具体解决步骤
- 涉及的配置修改或代码变更
- 验证方法

### 4. 预防措施与建议（100-200字）
- 如何避免类似问题
- 后续优化建议

---

## 对话上下文

${contextContent}

---

## 已上传文件

${uploadedFilesInfo || '无'}

---

请严格按照上述结构生成故障分析报告：`;

                showToast('success', '正在生成报告，请稍候...');
                showThinkingBubble();
                
                addMessage('user', '📊 生成对话分析报告');
                
                const models = getModels();
                const modelConfig = models.find(m => m.name === currentModel);
                if (!modelConfig) {
                    removeThinkingBubble();
                    addMessage('ai', '抱歉，未找到当前模型配置，无法生成报告。');
                    return;
                }
                
                try {
                    const apiKey = modelConfig.apiKey;
                    if (!apiKey) {
                        throw new Error('API密钥未配置');
                    }
                    
                    const isGLM = modelConfig.type === 'bigmodel';
                    let reportContent;
                    
                    if (isGLM) {
                        const modelMap = {
                            'glm-5': 'glm-5',
                            'glm-4.7': 'glm-4.7v',
                            'glm-4v': 'glm-4v'
                        };
                        
                        const modelName = modelMap[modelConfig.bigmodel] || 'glm-5';
                        const apiUrl = modelConfig.apiBaseUrl || 'https://open.bigmodel.cn/api/coding/paas/v4/chat/completions';
                        
                        const response = await fetch(apiUrl, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${apiKey}`
                            },
                            body: JSON.stringify({
                                model: modelName,
                                messages: [
                                    {
                                        role: 'system',
                                        content: '你是一个专业的技术支持报告撰写助手。请根据用户提供的对话上下文，生成结构清晰、内容详实的Markdown格式分析报告。'
                                    },
                                    {
                                        role: 'user',
                                        content: reportPrompt
                                    }
                                ]
                            })
                        });
                        
                        if (response.ok) {
                            const data = await response.json();
                            reportContent = data.choices && data.choices[0] && data.choices[0].message 
                                ? data.choices[0].message.content 
                                : '抱歉，报告生成失败。';
                        } else {
                            throw new Error('API请求失败');
                        }
                    } else {
                        const apiBaseUrl = getSafeApiBaseUrl(modelConfig.apiBaseUrl);
                        
                        const response = await fetch(`${apiBaseUrl}/chat-messages`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${apiKey}`
                            },
                            body: JSON.stringify({
                                inputs: {},
                                query: reportPrompt,
                                response_mode: 'blocking',
                                user: 'user-' + Date.now()
                            })
                        });
                        
                        if (response.ok) {
                            const data = await response.json();
                            reportContent = data.answer || '抱歉，报告生成失败。';
                        } else {
                            throw new Error('Dify API请求失败');
                        }
                    }
                    
                    removeThinkingBubble();
                    
                    const now = new Date();
                    const timestamp = now.toLocaleString('zh-CN', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                    
                    const fullReport = `# 对话分析报告

**生成时间**: ${timestamp}  
**使用模型**: ${currentModel}

---

${reportContent}

---
*本报告由 VastBase 智能助手自动生成*
`;
                    
                    const blob = new Blob([fullReport], { type: 'text/markdown;charset=utf-8' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `对话分析报告_${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2,'0')}${now.getDate().toString().padStart(2,'0')}_${now.getHours().toString().padStart(2,'0')}${now.getMinutes().toString().padStart(2,'0')}.md`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    
                    addMessage('ai', `✅ 报告已生成并下载！\n\n报告包含以下内容：\n- 问题概述\n- 对话摘要\n- 关键发现\n- 解决方案\n- 建议与后续步骤`);
                    
                    showToast('success', '报告已生成并下载');
                } catch (error) {
                    console.error('生成报告失败:', error);
                    removeThinkingBubble();
                    addMessage('ai', getFriendlyErrorMessage(error.message));
                    showToast('error', '报告生成失败');
                }
            }
            
            sendBtn.addEventListener('click', sendMessage);
            
            chatInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            attachBtn.addEventListener('click', function() {
                fileInput.click();
            });
            
            fileInput.addEventListener('change', function(e) {
                if (this.files.length > 0) {
                    handleFileUpload(this.files);
                    this.value = '';
                }
            });
            
            resetConversationBtn.addEventListener('click', resetConversation);
            exportReportBtn.addEventListener('click', exportReport);
            
            toggleSidebar.addEventListener('click', function() {
                sidebar.classList.toggle('sidebar-mobile-hidden');
                sidebar.classList.toggle('sidebar-mobile-visible');
                sidebarOverlay.classList.toggle('hidden');
            });
            
            sidebarOverlay.addEventListener('click', function() {
                sidebar.classList.add('sidebar-mobile-hidden');
                sidebar.classList.remove('sidebar-mobile-visible');
                sidebarOverlay.classList.add('hidden');
            });
            
            loadPendingIssue();
            updateSidebarFiles();
        });
    </script>
</body>
